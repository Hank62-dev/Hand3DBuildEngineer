<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HAND·BUILD — 3D AR</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');
  :root {
    --cyan:#00fff7; --pink:#ff00cc; --orange:#ff6600;
    --green:#00ff88; --bg:#020408; --panel:rgba(0,18,36,0.88);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#000; font-family:'Share Tech Mono',monospace; color:var(--cyan); overflow:hidden; width:100vw; height:100vh; }

  #video {
    position:fixed; inset:0; width:100%; height:100%; object-fit:cover; z-index:0;
    transform:scaleX(-1); /* mirror webcam */
  }

  #threeCanvas { position:fixed; inset:0; z-index:1; }

  #handOverlay { position:fixed; inset:0; z-index:5; pointer-events:none; }

  #hud { 
    position:fixed; top:0; left:0; right:0; z-index:20; 
    display:flex; align-items:center; justify-content:space-between; 
    padding:12px 24px; 
    background:linear-gradient(180deg,rgba(0,4,12,.92) 0%,transparent 100%); 
    border-bottom:1px solid rgba(0,255,247,.15); 
  }
  .title{font-family:'Orbitron',sans-serif;font-weight:900;font-size:19px;letter-spacing:5px;color:var(--cyan);text-shadow:0 0 25px var(--cyan);}
  .title span{color:var(--pink);}
  .stats{display:flex;gap:24px;}
  .stat{text-align:center;}
  .stat b{font-family:'Orbitron',sans-serif;font-size:20px;color:var(--orange);text-shadow:0 0 10px var(--orange);display:block;}
  .stat s{font-size:9px;color:rgba(0,255,247,.65);}

  #gp{position:fixed;right:16px;top:50%;transform:translateY(-50%);z-index:20;display:flex;flex-direction:column;gap:7px;}
  .gc{background:var(--panel);border:1px solid rgba(0,255,247,.22);border-radius:6px;padding:7px 12px;width:170px;backdrop-filter:blur(12px);}
  .gc.on{border-color:var(--green);box-shadow:0 0 18px rgba(0,255,136,.45);background:rgba(0,255,136,.09);}
  .gc i{font-size:16px;margin-right:7px;}
  .gc h4{font-family:'Orbitron',sans-serif;font-size:8.5px;letter-spacing:2px;color:var(--cyan);}
  .gc p{font-size:8.2px;color:rgba(255,255,255,.38);margin-top:3px;line-height:1.35;}

  #sb{position:fixed;bottom:18px;right:18px;z-index:20;background:var(--panel);border:1px solid rgba(0,255,247,.22);border-radius:6px;padding:10px 18px;font-size:10.5px;backdrop-filter:blur(10px);min-width:210px;}
  .sl{display:flex;align-items:center;gap:8px;margin-bottom:4px;}
  .dot{width:7px;height:7px;border-radius:50%;background:var(--orange);animation:bl 1s infinite;}
  .dot.ok{background:var(--green);animation:none;}
  @keyframes bl{0%,100%{opacity:1}50%{opacity:.2}}
  #gname{font-family:'Orbitron',sans-serif;font-size:13.5px;color:var(--pink);letter-spacing:3px;margin-top:7px;}

  #ctrl{position:fixed;bottom:220px;left:18px;z-index:20;display:flex;flex-direction:column;gap:7px;}
  .cb{background:var(--panel);border:1px solid rgba(0,255,247,.25);color:var(--cyan);font-size:10.5px;letter-spacing:1px;padding:7px 16px;border-radius:5px;cursor:pointer;transition:all .15s;}
  .cb:hover{background:rgba(0,255,247,.13);border-color:var(--cyan);box-shadow:0 0 14px rgba(0,255,247,.35);}

  #loading{position:fixed;inset:0;z-index:200;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;}
  #loading h1{font-family:'Orbitron',sans-serif;font-size:29px;font-weight:900;letter-spacing:8px;color:var(--cyan);text-shadow:0 0 32px var(--cyan);animation:gp 1.5s infinite;}
  .lb{width:320px;height:4px;background:rgba(0,255,247,.1);border-radius:3px;overflow:hidden;}
  .lf{height:100%;background:linear-gradient(90deg,var(--cyan),var(--pink));animation:ld 3s ease forwards;}
  @keyframes ld{from{width:0}to{width:100%}}
</style>
</head>
<body>

<video id="video" autoplay playsinline></video>
<canvas id="threeCanvas"></canvas>
<canvas id="handOverlay"></canvas>

<div id="hud">
  <div class="title">HAND<span>·</span>BUILD</div>
  <div class="stats">
    <div class="stat"><b id="v-blocks">0</b><s>BLOCKS</s></div>
    <div class="stat"><b id="v-fps">--</b><s>FPS</s></div>
    <div class="stat"><b id="v-hands">0</b><s>HANDS</s></div>
    <div class="stat"><b id="v-sel">0</b><s>SELECTED</s></div>
    <div class="stat"><b id="v-depth">MID</b><s>DEPTH</s></div>
  </div>
</div>

<div id="gp">
  <div class="gc on" id="c-pinch"><i>✌️</i><h4>PINCH BUILD</h4><p>2 ngón chạm → đặt khối tự do 3D</p></div>
  <div class="gc" id="c-fist"><i>✊</i><h4>FIST GRAB</h4><p>Nắm tay → kéo nhóm khối</p></div>
  <div class="gc" id="c-open"><i>🖐️</i><h4>OPEN RELEASE</h4><p>Mở tay → thả & snap</p></div>
  <div class="gc" id="c-point"><i>☝️</i><h4>POINT ORBIT</h4><p>Ngón trỏ → xoay góc nhìn</p></div>
</div>

<div id="sb">
  <div class="sl"><div class="dot" id="d-cam"></div><span id="t-cam">CAMERA LIVE</span></div>
  <div class="sl"><div class="dot" id="d-mp"></div><span id="t-mp">AR READY</span></div>
  <div id="gname">WAITING FOR HAND...</div>
</div>

<div id="ctrl">
  <button class="cb" onclick="clearAll()">⬛ CLEAR ALL</button>
  <button class="cb" onclick="undoLast()">↩ UNDO</button>
  <button class="cb" onclick="toggleWire()">◻ WIREFRAME</button>
  <button class="cb" onclick="resetCam()">🎥 RESET CAM</button>
</div>

<div id="loading">
  <h1>HAND·BUILD</h1>
  <div class="lb"><div class="lf"></div></div>
  <p id="load-msg">INITIALIZING AR...</p>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ====================== THREE.JS AR SETUP ======================
const renderer = new THREE.WebGLRenderer({
  canvas: document.getElementById('threeCanvas'),
  antialias: true,
  alpha: true
});
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(devicePixelRatio);
renderer.shadowMap.enabled = true;

const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x001122, 0.008);

const camera = new THREE.PerspectiveCamera(60, innerWidth/innerHeight, 0.1, 500);
camera.position.set(0, 8, 22);

scene.add(new THREE.AmbientLight(0x112233, 1.8));
const dirLight = new THREE.DirectionalLight(0x00ffff, 0.9);
dirLight.position.set(10, 25, 15);
scene.add(dirLight);

// Blocks - Chỉ màu xanh dương
const BS = 1.2;
const blocks = [];
let wireMode = false;
const PAL = [{m:0x00fff7, e:0x002233}];

function snap(v){ return Math.round(v/BS)*BS; }

const bMap = new Map();
function bKey(x,y,z){ return `${Math.round(x/BS)},${Math.round(y/BS)},${Math.round(z/BS)}`; }

function makeBlock(x,y,z){
  const c = PAL[0];
  const geo = new THREE.BoxGeometry(BS, BS, BS);
  const mat = new THREE.MeshPhongMaterial({color:c.m, emissive:c.e, shininess:100, wireframe:wireMode});
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.set(x,y,z);
  mesh.castShadow = true;
  mesh.receiveShadow = true;
  scene.add(mesh);
  blocks.push(mesh);

  mesh.scale.setScalar(0.01);
  mat.transparent = true;
  mat.opacity = 0;
  let t = 0;
  const anim = () => {
    t = Math.min(t + 0.15, 1);
    const s = 1 - Math.pow(1-t, 3);
    mesh.scale.setScalar(s);
    mat.opacity = t;
    if(t < 1) requestAnimationFrame(anim);
    else mat.transparent = false;
  };
  requestAnimationFrame(anim);

  document.getElementById('v-blocks').textContent = blocks.length;
}

function placeAt(wp){
  const sx = snap(wp.x);
  const sy = Math.max(0, snap(wp.y));
  const sz = snap(wp.z);
  const k = bKey(sx, sy, sz);
  if(!bMap.has(k)){
    bMap.set(k, makeBlock(sx, sy, sz));
  }
}

// ====================== CURSOR 3D (tự do theo góc nhìn) ======================
function getCursorPos(lms, isPinch = false){
  let hx, hy, hz;
  if(isPinch){
    hx = (lms[4].x + lms[8].x) / 2;
    hy = (lms[4].y + lms[8].y) / 2;
    hz = (lms[4].z + lms[8].z) / 2;
  } else {
    hx = lms[9].x; hy = lms[9].y; hz = lms[9].z;
  }

  const ndcX = 2 * (1 - hx) - 1;
  const ndcY = 1 - 2 * hy;

  const vector = new THREE.Vector3(ndcX, ndcY, 0.5);
  vector.unproject(camera);
  const dir = vector.sub(camera.position).normalize();

  let distance = 14 + hz * -85;
  distance = Math.max(6, Math.min(48, distance));

  return camera.position.clone().add(dir.multiplyScalar(distance));
}

// 3D Cursor
const curG = new THREE.Group(); scene.add(curG);
const curMat = new THREE.MeshPhongMaterial({color:0x00fff7, emissive:0x004444, transparent:true, opacity:0.92});
curG.add(new THREE.Mesh(new THREE.SphereGeometry(0.18, 16, 16), curMat));
const ring = new THREE.Mesh(new THREE.TorusGeometry(0.36, 0.04, 8, 32), 
  new THREE.MeshBasicMaterial({color:0x00fff7, transparent:true, opacity:0.55}));
curG.add(ring);
curG.visible = false;

// ====================== CAMERA ORBIT ======================
let cTgt = new THREE.Vector3(0, 3, 0), camTheta = 0.3, camPhi = Math.PI/3.5, camR = 24;
function updateOrbit(){
  camera.position.set(
    cTgt.x + camR * Math.sin(camPhi) * Math.sin(camTheta),
    cTgt.y + camR * Math.cos(camPhi),
    cTgt.z + camR * Math.sin(camPhi) * Math.cos(camTheta)
  );
  camera.lookAt(cTgt);
}
updateOrbit();

// ====================== EVENT LISTENERS ======================
const tc = document.getElementById('threeCanvas');
let drag = false, mx = 0, my = 0;

tc.addEventListener('mousedown', e => { drag = true; mx = e.clientX; my = e.clientY; });
tc.addEventListener('mouseup', () => { drag = false; });
tc.addEventListener('mousemove', e => {
  if (!drag) return;
  camTheta -= (e.clientX - mx) * 0.0055;
  camPhi = Math.max(0.15, Math.min(Math.PI/2 - 0.15, camPhi - (e.clientY - my) * 0.0055));
  mx = e.clientX; my = e.clientY;
  updateOrbit();
});
tc.addEventListener('wheel', e => {
  camR = Math.max(6, Math.min(65, camR + e.deltaY * 0.07));
  updateOrbit();
});

window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
  ov.width = innerWidth; ov.height = innerHeight;
});

// ====================== OVERLAY ======================
const ov = document.getElementById('handOverlay');
const ovCtx = ov.getContext('2d');
ov.width = innerWidth; ov.height = innerHeight;

let curLMs = null, curGesture = 'IDLE';
let lastPlaceTime = 0;
const PLACE_COOLDOWN = 55;

function animate(){
  requestAnimationFrame(animate);

  // FPS
  if(Date.now() - (window.lastFps||0) > 1000){
    document.getElementById('v-fps').textContent = window.fpsCount || '--';
    window.fpsCount = 0;
    window.lastFps = Date.now();
  }
  window.fpsCount = (window.fpsCount||0) + 1;

  ring.rotation.z += 0.06;

  if(curLMs){
    curG.visible = true;
    const isPinch = curGesture === 'PINCH';
    const targetPos = getCursorPos(curLMs, isPinch);
    curG.position.lerp(targetPos, 0.35);
  } else {
    curG.visible = false;
  }

  renderer.render(scene, camera);
}
animate();

// ====================== GESTURE DETECTION & LOGIC ======================
const grabbed = [];

function onResults(results){
  const n = results.multiHandLandmarks?.length || 0;
  document.getElementById('v-hands').textContent = n;
  document.querySelectorAll('.gc').forEach(el => el.classList.remove('on'));

  if(!n){
    curLMs = null; curGesture = 'IDLE';
    releaseGroup(false);
    document.getElementById('gname').textContent = 'NO HAND DETECTED';
    return;
  }

  const lms = results.multiHandLandmarks[0];
  curLMs = lms;

  const g = detect(lms);
  curGesture = g.name;
  document.getElementById('gname').textContent = g.name.toUpperCase();

  // PINCH - Đặt khối tự do
  if(g.name === 'PINCH'){
    document.getElementById('c-pinch').classList.add('on');
    const now = Date.now();
    if(now - lastPlaceTime > PLACE_COOLDOWN){
      const wp = getCursorPos(lms, true);
      placeAt(wp);
      lastPlaceTime = now;
    }
  }

  // FIST - Grab
  if(g.name === 'FIST'){
    document.getElementById('c-fist').classList.add('on');
    const wp = getCursorPos(lms);
    if(!grabbed.length){
      const R = 6.5;
      blocks.forEach(b => {
        if(b.position.distanceTo(wp) < R){
          grabbed.push({mesh:b, offset: b.position.clone().sub(wp)});
          b.material.emissive.setHex(0x003344);
        }
      });
      document.getElementById('v-sel').textContent = grabbed.length;
    } else {
      const wp2 = getCursorPos(lms);
      grabbed.forEach(({mesh, offset}) => {
        const tgt = wp2.clone().add(offset);
        tgt.y = Math.max(0.2, tgt.y);
        mesh.position.lerp(tgt, 0.32);
      });
    }
  }

  if(g.name === 'OPEN'){
    document.getElementById('c-open').classList.add('on');
    releaseGroup(true);
  }

  if(g.name === 'POINT'){
    document.getElementById('c-point').classList.add('on');
    camTheta -= (g.tip.x - 0.5) * 0.038;
    camPhi = Math.max(0.15, Math.min(Math.PI/2 - 0.15, camPhi - (g.tip.y - 0.42) * 0.028));
    updateOrbit();
  }
}

function releaseGroup(doSnap){
  if(!grabbed.length) return;
  grabbed.forEach(({mesh}) => {
    if(doSnap){
      mesh.position.set(snap(mesh.position.x), Math.max(0.2, snap(mesh.position.y)), snap(mesh.position.z));
    }
    mesh.material.emissive.setHex(PAL[0].e);
  });
  grabbed.length = 0;
  document.getElementById('v-sel').textContent = 0;
}

function detect(lms){
  const dist = (a,b) => Math.hypot(a.x-b.x, a.y-b.y, a.z-b.z);
  const PIP = [6,10,14,18], TIPS = [8,12,16,20];
  const ext = TIPS.map((t,i) => lms[t].y < lms[PIP[i]].y);
  const pinchD = dist(lms[4], lms[8]);

  if(pinchD < 0.065) return {name:'PINCH'};
  if(!ext[0] && !ext[1] && !ext[2] && !ext[3]) return {name:'FIST'};
  if(ext[0] && !ext[1] && !ext[2] && !ext[3]) return {name:'POINT', tip:lms[8]};
  if(ext[0] && ext[1] && ext[2] && ext[3]) return {name:'OPEN'};
  return {name:'IDLE'};
}

// ====================== INIT ======================
async function main(){
  const vid = document.getElementById('video');
  try{
    const stream = await navigator.mediaDevices.getUserMedia({video:{facingMode:'user', width:1280, height:720}});
    vid.srcObject = stream;
    await vid.play();
    document.getElementById('d-cam').className = 'dot ok';
  } catch(e){
    document.getElementById('t-cam').textContent = 'CAMERA ERROR';
  }

  await Promise.all([
    loadScript('https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils@0.3.1675466862/camera_utils.js'),
    loadScript('https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1675469240/hands.js')
  ]);

  const hands = new Hands({locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1675469240/${f}`});
  hands.setOptions({maxNumHands:2, modelComplexity:1, minDetectionConfidence:0.78, minTrackingConfidence:0.68});
  hands.onResults(onResults);

  const mpCam = new Camera(vid, {
    onFrame: async () => { await hands.send({image: vid}); },
    width: 1280, height: 720
  });

  await mpCam.start();
  document.getElementById('loading').style.display = 'none';
  document.getElementById('d-mp').className = 'dot ok';
}

function loadScript(src){
  return new Promise((res,rej) => {
    const s = document.createElement('script');
    s.src = src; s.crossOrigin = 'anonymous';
    s.onload = res; s.onerror = rej;
    document.head.appendChild(s);
  });
}

main();

// Demo blocks
setTimeout(() => {
  for(let i = -5; i <= 5; i += 2) makeBlock(i*1.4, 1.5, -10);
}, 1000);

// Global functions
window.clearAll = () => { 
  blocks.forEach(b => scene.remove(b)); 
  blocks.length = 0; 
  bMap.clear(); 
  document.getElementById('v-blocks').textContent = 0; 
};
window.undoLast = () => {
  if(!blocks.length) return;
  const b = blocks.pop();
  scene.remove(b);
  bMap.forEach((v,k) => { if(v === b) bMap.delete(k); });
  document.getElementById('v-blocks').textContent = blocks.length;
};
window.toggleWire = () => {
  wireMode = !wireMode;
  blocks.forEach(b => b.material.wireframe = wireMode);
};
window.resetCam = () => {
  camTheta = 0.3; camPhi = Math.PI/3.5; camR = 24;
  cTgt.set(0, 3, 0);
  updateOrbit();
};
</script>
</body>
</html>
